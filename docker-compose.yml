services:
  neoma-app:
    build: .
    image: neoma-app:latest
    container_name: neoma-app
    restart: unless-stopped
    env_file: .env
    expose:
      - "3000"
    networks:
      - default
      - npm

networks:
  # NPM reaches this container via the shared external network. Same pattern
  # as edh / mieuxassure / educnat / keolis on this VPS.
  npm:
    external: true
    name: mcp-robot_default
